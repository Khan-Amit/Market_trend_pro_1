<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📊 MARKET TRENDS PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 24px 16px;
            color: #eef2ff;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #c0ffb0, #4c9aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #8f9bb5;
            font-size: 0.85rem;
        }
        .risk-panel, .ai-card, .slider-panel {
            background: #101624;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid #252e42;
        }
        .slider-panel label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #b9c7ff;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #2a3457;
            border-radius: 10px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #5f8aff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px #5f8aff;
        }
        .risk-value {
            display: inline-block;
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            margin-top: 12px;
            font-size: 0.85rem;
        }
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }
        .indicator-card {
            background: #0c1122;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
        }
        .indicator-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #8e9ad0;
        }
        .indicator-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 8px 0 4px;
            font-family: monospace;
        }
        .score-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .score-big {
            font-size: 3rem;
            font-weight: 800;
            background: #00d4ff30;
            padding: 6px 20px;
            border-radius: 60px;
        }
        .trend-badge {
            font-size: 1.3rem;
            background: #1b4d3c30;
            padding: 6px 18px;
            border-radius: 50px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .history-table th, .history-table td {
            padding: 8px;
            border-bottom: 1px solid #253053;
            text-align: center;
        }
        button {
            background: #2e3a60;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 12px;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 32px;
            color: #5c6990;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 MARKET TRENDS PRO</h1>
        <div class="sub">GLOBAL INTELLIGENCE • REAL-TIME ANALYSIS</div>
        <div style="font-family: monospace; margin-top: 8px;">33 · 17 · 41 · 08 · 25 · 39 // 12 · 56</div>
    </div>

    <!-- SLIDER PANEL (Risk Bar) -->
    <div class="slider-panel">
        <label>⚙️ RISK TOLERANCE <span id="riskLabel" style="float:right;">NEUTRAL</span></label>
        <input type="range" id="riskSlider" min="0" max="100" value="50">
        <div class="risk-value">Market volatility factor: <span id="riskValue">0.50</span></div>
        <div style="font-size:0.75rem; margin-top: 8px;">⬅️ Conservative | Aggressive ➡️</div>
    </div>

    <div class="risk-panel">
        <div class="indicators-grid" id="indicatorsGrid"></div>
    </div>

    <div class="ai-card" id="aiCard">
        <div class="score-row">
            <span>🤖 AI ANALYSIS</span>
            <span id="confidenceVal">—</span>
        </div>
        <div class="score-row">
            <span class="score-big" id="scoreVal">0.000</span>
            <span class="trend-badge" id="trendLabel">—</span>
        </div>
        <div class="score-row">
            <span id="timingMsg">🟡 MONITOR</span>
            <span id="actionText">HOLD</span>
        </div>
        <button id="resetGoldBtn">⟳ Reset Gold Price</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="history-table">
            <thead>股市<th>#</th><th>SCORE</th><th>Δ</th><th>DECISION</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
    <div class="footer-note" id="footerNote">📊 Data is local & protected | Gold fluctuates within market range</div>
</div>

<script>
    // -------- BASE MARKET DATA (realistic ranges) --------
    let baseIndicators = {
        gold: 3025.0,      // updated to current market price
        oil: 84.2,
        shipping: 1950,
        usDebt: 121.9,
        bricsAvg: 74.2,
        natoAvg: 104.0
    };

    // current working values (will drift slightly)
    let current = { ...baseIndicators };

    let riskFactor = 0.5;      // 0 = conservative, 1 = aggressive
    let history = [];

    // -------- helper: gold variation (keeps within ±1.5% of base) --------
    function varyGold() {
        let variation = (Math.random() - 0.5) * 0.03;  // ±1.5% drift
        let newGold = baseIndicators.gold * (1 + variation);
        // clamp to realistic band
        newGold = Math.min(baseIndicators.gold * 1.02, Math.max(baseIndicators.gold * 0.98, newGold));
        return parseFloat(newGold.toFixed(1));
    }

    // update other indicators with tiny drifts
    function driftMarkets() {
        current.gold = varyGold();
        current.oil = parseFloat((current.oil + (Math.random() - 0.5) * 0.6).toFixed(1));
        current.shipping = Math.round(current.shipping + (Math.random() - 0.5) * 5);
        current.usDebt = parseFloat((current.usDebt + (Math.random() - 0.5) * 0.3).toFixed(1));
        current.bricsAvg = parseFloat((current.bricsAvg + (Math.random() - 0.5) * 0.2).toFixed(1));
        current.natoAvg = parseFloat((current.natoAvg + (Math.random() - 0.5) * 0.2).toFixed(1));
        // boundaries
        current.oil = Math.min(98, Math.max(70, current.oil));
        current.shipping = Math.min(2100, Math.max(1850, current.shipping));
        current.usDebt = Math.min(126, Math.max(118, current.usDebt));
        current.bricsAvg = Math.min(78, Math.max(70, current.bricsAvg));
        current.natoAvg = Math.min(110, Math.max(98, current.natoAvg));
    }

    // -------- AI SCORE with risk slider influence --------
    function computeTrendScore(data, risk) {
        let goldOilRatio = data.gold / data.oil;
        let debtFactor = Math.min(1.2, data.usDebt / 120.0);
        let shippingNorm = Math.min(1.2, data.shipping / 1900);
        let bricsWeight = data.bricsAvg / 80.0;
        let natoWeight = data.natoAvg / 110.0;

        let raw = (goldOilRatio / 38.0) * 0.35
                + (1 - (debtFactor - 0.9)) * 0.25
                + (shippingNorm - 0.85) * 0.20
                + (bricsWeight - natoWeight + 0.15) * 0.20;

        // risk adjustment: higher risk = slightly amplifies bullish/bearish signal
        let riskAdj = (raw - 0.5) * risk * 0.3;
        let score = Math.min(0.99, Math.max(0.01, raw + riskAdj));
        return Math.round(score * 1000) / 1000;
    }

    function getTrendAndAction(score) {
        if (score >= 0.65) return { trend: "BULLISH 📈", action: "BUY / ACCUMULATE", timing: "🟢 ENTRY WINDOW", confidence: 85 };
        if (score >= 0.52) return { trend: "BULLISH 📈", action: "HOLD / ADD ON DIPS", timing: "🟡 OPPORTUNITY", confidence: 74 };
        if (score >= 0.44) return { trend: "NEUTRAL ⚖️", action: "HOLD / OBSERVE", timing: "🟡 MONITOR", confidence: 65 };
        if (score >= 0.35) return { trend: "CAUTIOUS 🧐", action: "REDUCE EXPOSURE", timing: "🔴 WAIT", confidence: 58 };
        return { trend: "BEARISH 📉", action: "AVOID NEW POSITIONS", timing: "🔴 STAND ASIDE", confidence: 52 };
    }

    function updateUI() {
        // update indicators grid
        const grid = document.getElementById('indicatorsGrid');
        grid.innerHTML = '';
        const items = [
            { label: 'GOLD', key: 'gold', unit: 'USD/oz' },
            { label: 'OIL (WTI)', key: 'oil', unit: 'USD/bbl' },
            { label: 'SHIPPING', key: 'shipping', unit: 'index' },
            { label: 'US DEBT/GDP', key: 'usDebt', unit: '%' },
            { label: 'BRICS AVG', key: 'bricsAvg', unit: '%' },
            { label: 'NATO AVG', key: 'natoAvg', unit: '%' }
        ];
        items.forEach(m => {
            let val = current[m.key];
            let card = document.createElement('div');
            card.className = 'indicator-card';
            card.innerHTML = `<div class="indicator-label">${m.label}</div>
                              <div class="indicator-value">${val.toFixed(1)}</div>
                              <div class="unit">${m.unit}</div>`;
            grid.appendChild(card);
        });

        let score = computeTrendScore(current, riskFactor);
        let trendObj = getTrendAndAction(score);
        document.getElementById('scoreVal').innerText = score.toFixed(3);
        document.getElementById('trendLabel').innerHTML = trendObj.trend;
        document.getElementById('timingMsg').innerHTML = trendObj.timing;
        document.getElementById('actionText').innerHTML = trendObj.action;
        document.getElementById('confidenceVal').innerHTML = `CONFIDENCE ${trendObj.confidence}%`;

        // history
        let lastScore = history.length ? history[history.length-1].score : score;
        let delta = score - lastScore;
        history.push({ run: history.length+1, score, delta, decision: trendObj.action.split(' ')[0] });
        if (history.length > 12) history.shift();

        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';
        [...history].reverse().forEach(rec => {
            let row = `<tr>
                        <td>${rec.run}</td>
                        <td>${rec.score.toFixed(3)}</td>
                        <td>${rec.delta > 0 ? '+' : ''}${rec.delta.toFixed(3)}</td>
                        <td>${rec.decision}</td>
                       </tr>`;
            tbody.innerHTML += row;
        });

        let avg = history.reduce((s, r) => s + r.score, 0) / history.length;
        document.getElementById('footerNote').innerHTML = `📊 ${history.length} runs | Avg: ${avg.toFixed(3)} | Current: ${score.toFixed(3)} | Gold live range ±1.5% | Risk factor: ${riskFactor.toFixed(2)} | Data stays on device.`;
    }

    // risk slider event
    const slider = document.getElementById('riskSlider');
    const riskValSpan = document.getElementById('riskValue');
    const riskLabelSpan = document.getElementById('riskLabel');
    slider.addEventListener('input', (e) => {
        riskFactor = e.target.value / 100;
        riskValSpan.innerText = riskFactor.toFixed(2);
        if (riskFactor < 0.3) riskLabelSpan.innerText = "CONSERVATIVE";
        else if (riskFactor > 0.7) riskLabelSpan.innerText = "AGGRESSIVE";
        else riskLabelSpan.innerText = "NEUTRAL";
        updateUI();
    });

    // reset gold to base market price
    document.getElementById('resetGoldBtn').addEventListener('click', () => {
        current.gold = baseIndicators.gold;
        updateUI();
    });

    // live drift every 25 seconds
    setInterval(() => {
        driftMarkets();
        updateUI();
    }, 25000);

    // initial load
    driftMarkets();   // small initial variety
    updateUI();
</script>
</body>
</html>
